name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: cohort-x86_64-linux
            container: quay.io/pypa/manylinux_2_28_x86_64
          - os: macos-14
            artifact: cohort-aarch64-macos
          - os: macos-15
            artifact: cohort-x86_64-macos
            target: x86_64-apple-darwin
          - os: windows-latest
            artifact: cohort-x86_64-windows

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (container)
        if: matrix.container != ''
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust
        if: matrix.container == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: registry-${{ matrix.artifact }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: registry-${{ matrix.artifact }}-

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: git-${{ matrix.artifact }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: git-${{ matrix.artifact }}-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target
          key: target-${{ matrix.artifact }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            target-${{ matrix.artifact }}-${{ hashFiles('Cargo.lock') }}-
            target-${{ matrix.artifact }}-

      - name: Build (container)
        if: matrix.container != ''
        run: |
          source $HOME/.cargo/env
          cargo build --release

      - name: Build (cross-compile)
        if: matrix.target != '' && matrix.container == ''
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target == '' && matrix.container == ''
        run: cargo build --release

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            BIN=target/${{ matrix.target }}/release/cohort
          else
            BIN=target/release/cohort
          fi
          tar czf ${{ matrix.artifact }}.tar.gz -C $(dirname $BIN) cohort
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 2>/dev/null \
            || sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/cohort.exe -DestinationPath ${{ matrix.artifact }}.zip
          (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash + "  ${{ matrix.artifact }}.zip" `
            | Out-File ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          generate_release_notes: true
