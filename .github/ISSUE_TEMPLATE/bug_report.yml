name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        ```bash
        cohort <command> ...
        ```
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: version
    attributes:
      label: COHORT version
      placeholder: "cohort --version"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - Linux (HPC / SLURM)
        - Linux (workstation)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
    validations:
      required: true
  - type: input
    id: memory
    attributes:
      label: Memory available
      placeholder: "e.g. 64G via srun, 16G workstation"
